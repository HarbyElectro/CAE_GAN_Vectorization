experiment:
  name: video_ucf101_autoencoder
  description: Conv + BiLSTM Video Autoencoder trained for sequence compression and reconstruction.
  output_dir: runs/video_ae
  seed: 42

dataset:
  name: UCF101
  type: video
  data_dir: data/UCF101
  image_size: 224
  channels: 3
  num_frames: 30
  num_train: 100
  num_test: 20

model:
  name: conv_bilstm_video_autoencoder
  framework: tensorflow_keras
  latent_sizes:
    - 8
    - 16
    - 32
    - 64
    - 128

training:
  epochs: 100
  batch_size: 16
  optimizer: adam
  loss: mean_squared_error
  early_stopping: true
  patience: 10

evaluation:
  metrics:
    - psnr
    - ssim
    - reconstruction_loss

outputs:
  save_reconstructions: true
  save_loss_plot: true
  save_metric_plot: true
  reconstruction_dir: runs/video_ae/reconstructed_frames
